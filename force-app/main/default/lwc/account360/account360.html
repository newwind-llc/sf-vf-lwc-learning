<template>
  <lightning-card
    title="取引先360 コマンドセンター"
    icon-name="standard:account"
  >
    <lightning-button-icon
      slot="actions"
      icon-name="utility:refresh"
      alternative-text="更新"
      title="更新"
      onclick={handleRefresh}
    ></lightning-button-icon>

    <div class="slds-is-relative slds-p-horizontal_small">
      <template lwc:if={isLoading}>
        <lightning-spinner
          alternative-text="読み込み中"
          size="small"
        ></lightning-spinner>
      </template>

      <template lwc:if={hasError}>
        <div class="slds-text-color_error slds-p-around_small" role="alert">
          {error}
        </div>
      </template>

      <!-- KPI カード（子コンポーネントを for:each で展開） -->
      <div class="slds-grid slds-wrap slds-gutters_x-small slds-m-bottom_small">
        <template for:each={kpiCards} for:item="c">
          <div key={c.key} class="slds-col slds-p-bottom_x-small">
            <c-kpi-card
              label={c.label}
              value={c.value}
              icon-name={c.iconName}
            ></c-kpi-card>
          </div>
        </template>
      </div>

      <!-- 関連レコードのタブ -->
      <lightning-tabset>
        <lightning-tab label={oppTabLabel}>
          <lightning-datatable
            key-field="Id"
            data={opportunities}
            columns={oppColumns}
            draft-values={oppDraftValues}
            onsave={handleOppSave}
            hide-checkbox-column
            column-widths-mode="auto"
          ></lightning-datatable>
          <p
            class="slds-text-body_small slds-text-color_weak slds-p-top_xx-small"
          >
            金額・完了予定日はインライン編集できます（セルを編集 → 保存）。
          </p>
        </lightning-tab>

        <lightning-tab label={contactTabLabel}>
          <lightning-datatable
            key-field="Id"
            data={contacts}
            columns={contactColumns}
            hide-checkbox-column
            column-widths-mode="auto"
          ></lightning-datatable>
        </lightning-tab>

        <lightning-tab label={caseTabLabel}>
          <lightning-datatable
            key-field="Id"
            data={cases}
            columns={caseColumns}
            hide-checkbox-column
            column-widths-mode="auto"
          ></lightning-datatable>
        </lightning-tab>

        <lightning-tab label={activityTabLabel}>
          <lightning-datatable
            key-field="id"
            data={activities}
            columns={activityColumns}
            hide-checkbox-column
            column-widths-mode="auto"
          ></lightning-datatable>
        </lightning-tab>
      </lightning-tabset>
    </div>
  </lightning-card>
</template>
